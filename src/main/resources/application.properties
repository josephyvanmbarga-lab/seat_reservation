spring.application.name=seat-reservation

# Configuration PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/seat_reservation
spring.datasource.username=admin
spring.datasource.password=password123

# Configuration JPA/Hibernate (Flyway gère la création, Hibernate valide)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.mbarga.seat_reservation.reservation

# JWT
app.jwt.secret=5A7134743777217A25432A46294A404E635266556A586E3272357538782F413F
app.jwt.expiration=86400000

# HERE Maps Routing API
app.here.api-key=YOUR_HERE_API_KEY_HERE

# Tarification (FCFA par kilometre)
app.tarif.par-km=100
